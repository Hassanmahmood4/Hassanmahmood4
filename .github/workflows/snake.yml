name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: snake-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: Hassanmahmood4
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark

      - name: Copy SVG into assets for README
        run: |
          mkdir -p assets
          cp -f dist/github-contribution-grid-snake.svg assets/github-contribution-grid-snake.svg

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update contribution snake SVG [skip ci]"
          file_pattern: assets/github-contribution-grid-snake.svg
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
